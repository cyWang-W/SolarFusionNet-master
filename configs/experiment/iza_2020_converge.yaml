# @package _global_

paths:
  data_dir: E:\solarfusionnet_preprocess\deeplake_iza_2020
  stats_path: E:\solarfusionnet_preprocess\deeplake_iza_2020_stats.json

datamodule:
  batch_size: 2
  num_workers: 0
  dataset:
    years:
      train: ["2020_train"]
      val: ["2020_val"]
      test: ["2020_test"]
    stations:
      train: ["IZA"]
      val: ["IZA"]
      test: ["IZA"]

pl_module:
  model:
    bands_number: 1
    batch_size: 2

callbacks:
  early_stopping:
    monitor: val/rmse
    patience: 8
    mode: min
  model_checkpoint:
    monitor: val/rmse
    mode: min
    save_last: true

trainer:
  max_epochs: 100
  limit_train_batches: 300
  limit_val_batches: 100
  limit_test_batches: 100
  gradient_clip_val: 1.0

test: true
